<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px 0;
    font-family: 'Courier New', monospace;
    color: #0f0;
  }
  #game-wrapper {
    text-align: center;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 8px;
    text-shadow: 0 0 10px #0f0;
    letter-spacing: 6px;
  }
  #score {
    font-size: 1.2rem;
    margin-bottom: 8px;
  }
  canvas {
    border: 3px solid #0f0;
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
    display: block;
    margin: 0 auto;
    image-rendering: pixelated;
  }
  #message {
    margin-top: 12px;
    font-size: 1rem;
    min-height: 1.4em;
  }
  #stats {
    margin-top: 6px;
    font-size: 0.85rem;
    color: #0a0;
  }
</style>
</head>
<body>
<div id="game-wrapper">
  <h1>SNAKE</h1>
  <div id="score">SCORE: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="message">Press any arrow key to start</div>
  <div id="stats">TOTAL PLAYS: ... | HIGH SCORE: ...</div>
</div>
<script>
const SUPABASE_URL = 'https://lixwpvodyhdxezbrgvja.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpeHdwdm9keWhkeGV6YnJndmphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTc4NDEsImV4cCI6MjA4ODE3Mzg0MX0.1cMp8WovIhNJ-wrVV9gixkLqix-o5gjxTpFLnh_z_n0';
const statsEl = document.getElementById('stats');
let globalHighScore = 0;

async function supabaseRpc(fnName, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fnName}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

function updateStats(plays, high) {
  statsEl.textContent = 'TOTAL PLAYS: ' + plays + ' | HIGH SCORE: ' + high;
}

async function fetchStats() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/play_count?select=total_plays,high_score&id=eq.1`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  const data = await res.json();
  if (data[0]) {
    globalHighScore = data[0].high_score;
    updateStats(data[0].total_plays, data[0].high_score);
  }
}

async function recordPlay() {
  const count = await supabaseRpc('increment_play_count');
  updateStats(count, globalHighScore);
}

async function submitScore(finalScore) {
  const high = await supabaseRpc('submit_score', { new_score: finalScore });
  globalHighScore = high;
  statsEl.textContent = statsEl.textContent.replace(/HIGH SCORE: \d+/, 'HIGH SCORE: ' + high);
}

fetchStats();

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('message');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;
const TICK_MS = 120;

let snake, dir, nextDir, food, score, running, gameOver;

function init() {
  const mid = Math.floor(COLS / 2);
  snake = [
    { x: mid, y: Math.floor(ROWS / 2) },
    { x: mid - 1, y: Math.floor(ROWS / 2) },
    { x: mid - 2, y: Math.floor(ROWS / 2) }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  running = false;
  gameOver = false;
  placeFood();
  updateScore();
  draw();
  msgEl.textContent = 'Press any arrow key to start';
}

function placeFood() {
  while (true) {
    food = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
    if (!snake.some(s => s.x === food.x && s.y === food.y)) break;
  }
}

function updateScore() {
  scoreEl.textContent = 'SCORE: ' + score;
}

function draw() {
  // Background
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines (subtle)
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID, 0);
    ctx.lineTo(x * GRID, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID);
    ctx.lineTo(canvas.width, y * GRID);
    ctx.stroke();
  }

  // Food
  ctx.fillStyle = '#f00';
  ctx.shadowColor = '#f00';
  ctx.shadowBlur = 8;
  ctx.fillRect(food.x * GRID + 2, food.y * GRID + 2, GRID - 4, GRID - 4);
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    ctx.fillStyle = i === 0 ? '#0f0' : '#0a0';
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = i === 0 ? 6 : 0;
    ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
  });
  ctx.shadowBlur = 0;
}

function tick() {
  if (!running) return;

  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return endGame();
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    updateScore();
    placeFood();
  } else {
    snake.pop();
  }

  draw();
  setTimeout(tick, TICK_MS);
}

function endGame() {
  running = false;
  gameOver = true;
  // Flash the snake red
  ctx.fillStyle = '#f00';
  snake.forEach(seg => {
    ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
  });
  msgEl.textContent = 'GAME OVER — Press ENTER to restart';
  submitScore(score);
}

document.addEventListener('keydown', e => {
  const key = e.key;

  if (gameOver && key === 'Enter') {
    init();
    return;
  }

  const directions = {
    ArrowUp:    { x:  0, y: -1 },
    ArrowDown:  { x:  0, y:  1 },
    ArrowLeft:  { x: -1, y:  0 },
    ArrowRight: { x:  1, y:  0 }
  };

  if (!directions[key]) return;
  e.preventDefault();

  const nd = directions[key];
  // Prevent reversing
  if (nd.x === -dir.x && nd.y === -dir.y) return;
  nextDir = nd;

  if (!running && !gameOver) {
    running = true;
    msgEl.textContent = '';
    recordPlay();
    tick();
  }
});

init();
</script>
</body>
</html>
