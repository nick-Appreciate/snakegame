<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px 0;
    font-family: 'Courier New', monospace;
    color: #0f0;
  }
  #game-wrapper {
    text-align: center;
  }
  h1 {
    font-size: 2rem;
    margin-bottom: 8px;
    text-shadow: 0 0 10px #0f0;
    letter-spacing: 6px;
  }
  #score {
    font-size: 1.2rem;
    margin-bottom: 8px;
  }
  canvas {
    border: 3px solid #0f0;
    box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
    display: block;
    margin: 0 auto;
    image-rendering: pixelated;
  }
  #message {
    margin-top: 12px;
    font-size: 1rem;
    min-height: 1.4em;
  }
  #stats {
    margin-top: 6px;
    font-size: 0.85rem;
    color: #0a0;
  }
  #name-form {
    margin-top: 12px;
  }
  #name-form label {
    font-size: 1rem;
  }
  #name-input {
    background: #222;
    border: 2px solid #0f0;
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    padding: 4px 8px;
    margin-left: 8px;
    outline: none;
    width: 140px;
    text-transform: uppercase;
  }
  #name-input:focus {
    box-shadow: 0 0 8px rgba(0, 255, 0, 0.4);
  }
  #name-form button {
    background: #0f0;
    color: #111;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 1rem;
    font-weight: bold;
    padding: 5px 14px;
    margin-left: 8px;
    cursor: pointer;
  }
  #name-form button:hover {
    background: #0a0;
    color: #fff;
  }
  #leaderboard {
    margin-top: 16px;
    display: inline-block;
    text-align: left;
    min-width: 280px;
  }
  #leaderboard h2 {
    font-size: 1rem;
    text-align: center;
    margin-bottom: 6px;
    letter-spacing: 3px;
  }
  #leaderboard table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  #leaderboard th {
    color: #0f0;
    border-bottom: 1px solid #0f0;
    padding: 3px 8px;
    text-align: left;
  }
  #leaderboard td {
    color: #0a0;
    padding: 2px 8px;
  }
  #leaderboard tr.gold td { color: #ff0; }
  #leaderboard tr.silver td { color: #ccc; }
  #leaderboard tr.bronze td { color: #c84; }
</style>
</head>
<body>
<div id="game-wrapper">
  <h1>SNAKE</h1>
  <div id="score">SCORE: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="message"></div>
  <div id="name-form">
    <label>ENTER NAME:</label>
    <input type="text" id="name-input" maxlength="12" placeholder="PLAYER" autofocus>
    <button id="name-btn">PLAY</button>
  </div>
  <div id="stats">TOTAL PLAYS: ... | HIGH SCORE: ...</div>
  <div id="leaderboard">
    <h2>LEADERBOARD</h2>
    <table>
      <thead><tr><th>#</th><th>NAME</th><th>SCORE</th></tr></thead>
      <tbody id="lb-body"></tbody>
    </table>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://lixwpvodyhdxezbrgvja.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpeHdwdm9keWhkeGV6YnJndmphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTc4NDEsImV4cCI6MjA4ODE3Mzg0MX0.1cMp8WovIhNJ-wrVV9gixkLqix-o5gjxTpFLnh_z_n0';
const statsEl = document.getElementById('stats');
const nameForm = document.getElementById('name-form');
const nameInput = document.getElementById('name-input');
const nameBtn = document.getElementById('name-btn');
const lbBody = document.getElementById('lb-body');
let globalHighScore = 0;
let globalHighName = '';
let playerName = '';

// --- Supabase ---
async function supabaseRpc(fnName, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fnName}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

function updateStats(plays, high, name) {
  const nameStr = name ? ' by ' + name : '';
  statsEl.textContent = 'TOTAL PLAYS: ' + plays + ' | HIGH SCORE: ' + high + nameStr;
}

async function fetchStats() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/play_count?select=total_plays,high_score,high_score_name&id=eq.1`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  const data = await res.json();
  if (data[0]) {
    globalHighScore = data[0].high_score;
    globalHighName = data[0].high_score_name;
    updateStats(data[0].total_plays, data[0].high_score, data[0].high_score_name);
  }
}

async function fetchLeaderboard() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/leaderboard?select=player_name,score&order=score.desc&limit=10`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  const data = await res.json();
  const medals = ['gold', 'silver', 'bronze'];
  lbBody.innerHTML = data.map((row, i) => {
    const cls = i < 3 ? ` class="${medals[i]}"` : '';
    return `<tr${cls}><td>${i + 1}</td><td>${row.player_name}</td><td>${row.score}</td></tr>`;
  }).join('');
  if (data.length === 0) {
    lbBody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#555">No games yet</td></tr>';
  }
}

async function recordPlay() {
  const count = await supabaseRpc('increment_play_count');
  updateStats(count, globalHighScore, globalHighName);
}

async function submitScore(finalScore) {
  await supabaseRpc('submit_game', { player_name: playerName, final_score: finalScore });
  await fetchStats();
  await fetchLeaderboard();
}

fetchStats();
fetchLeaderboard();

// --- Game ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('message');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;
const TICK_MS = 120;

let snake, dir, nextDir, food, score, running, gameOver, waitingForName;

function showNameForm() {
  waitingForName = true;
  nameForm.style.display = '';
  nameInput.value = playerName;
  nameInput.focus();
}

function hideNameForm() {
  waitingForName = false;
  nameForm.style.display = 'none';
}

function startGame() {
  const name = nameInput.value.trim().toUpperCase();
  if (!name) { nameInput.focus(); return; }
  playerName = name;
  hideNameForm();
  resetBoard();
  msgEl.textContent = 'Press any arrow key to start';
}

nameBtn.addEventListener('click', startGame);
nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});

function resetBoard() {
  const mid = Math.floor(COLS / 2);
  snake = [
    { x: mid, y: Math.floor(ROWS / 2) },
    { x: mid - 1, y: Math.floor(ROWS / 2) },
    { x: mid - 2, y: Math.floor(ROWS / 2) }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  running = false;
  gameOver = false;
  placeFood();
  updateScore();
  draw();
}

function init() {
  resetBoard();
  showNameForm();
}

function placeFood() {
  while (true) {
    food = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
    if (!snake.some(s => s.x === food.x && s.y === food.y)) break;
  }
}

function updateScore() {
  scoreEl.textContent = 'SCORE: ' + score;
}

function draw() {
  // Background
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines (subtle)
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * GRID, 0);
    ctx.lineTo(x * GRID, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * GRID);
    ctx.lineTo(canvas.width, y * GRID);
    ctx.stroke();
  }

  // Food
  ctx.fillStyle = '#f00';
  ctx.shadowColor = '#f00';
  ctx.shadowBlur = 8;
  ctx.fillRect(food.x * GRID + 2, food.y * GRID + 2, GRID - 4, GRID - 4);
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    ctx.fillStyle = i === 0 ? '#0f0' : '#0a0';
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = i === 0 ? 6 : 0;
    ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
  });
  ctx.shadowBlur = 0;
}

function tick() {
  if (!running) return;

  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return endGame();
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    updateScore();
    placeFood();
  } else {
    snake.pop();
  }

  draw();
  setTimeout(tick, TICK_MS);
}

function endGame() {
  running = false;
  gameOver = true;
  // Flash the snake red
  ctx.fillStyle = '#f00';
  snake.forEach(seg => {
    ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
  });
  msgEl.textContent = 'GAME OVER — Press ENTER to restart';
  submitScore(score);
}

document.addEventListener('keydown', e => {
  const key = e.key;

  if (waitingForName) return;

  if (gameOver && key === 'Enter') {
    showNameForm();
    return;
  }

  const directions = {
    ArrowUp:    { x:  0, y: -1 },
    ArrowDown:  { x:  0, y:  1 },
    ArrowLeft:  { x: -1, y:  0 },
    ArrowRight: { x:  1, y:  0 }
  };

  if (!directions[key]) return;
  e.preventDefault();

  const nd = directions[key];
  // Prevent reversing
  if (nd.x === -dir.x && nd.y === -dir.y) return;
  nextDir = nd;

  if (!running && !gameOver) {
    running = true;
    msgEl.textContent = '';
    recordPlay();
    tick();
  }
});

init();
</script>
</body>
</html>
